<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@allmaps/leaflet</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css"
      integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14="
      crossorigin=""
    />

    <script
      src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js"
      integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg="
      crossorigin=""
    ></script>
    <style>
      body {
        width: 100%;
        height: 100%;
        position: absolute;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        font-family: monospace;
      }

      #map {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="module">
      import { WarpedMapLayer } from './src/index.ts'

      const map = L.map('map', {
        center: [51.0518, 3.7278],
        zoom: 14,
        // Zoom animations for more than one zoom level are
        // currently not supported by the Allmaps plugin for Leaflet
        zoomAnimationThreshold: 1
      })

      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map)

      const annotationUrl =
        'https://annotations.allmaps.org/maps/2d49b3ecd1ba6346'

      const warpedMapLayer = new WarpedMapLayer(annotationUrl).addTo(map)
    </script>
  </body>
</html>
